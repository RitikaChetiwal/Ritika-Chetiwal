<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="body">
        <header>
            <div class="nav">
                <a href="#">Gmail</a>
                <a href="#">Images</a>
                <i class="ri-flask-fill"></i>
                <i class="ri-apps-2-fill"></i>
                <i class="ri-circle-fill"></i>
            </div>
        </header>
        <div>
            <img class="image" src="media-box/google-image.png" alt="image">
        </div>
        <div class="searchbar">
            <i class="fas fa-search icon"></i>
            <input class="input" id="searchbar" type="text" placeholder="Search Google or type a URL">
            <div class="right">
                <i class="fas fa-microphone mic-icon"></i>
                <i class="fas fa-qrcode qr-icon"></i>
            </div>
        </div>
        
        <div class="shortcuts">
            <div class="apps"><img src="./media-box/webstore.png" alt="">Web Store</div>
            <div class="apps"><img src="./media-box/youtube.png" alt="">YouTube</div>
            <div class="apps"><img src="./media-box/playstore.png" alt="">Play Store</div>
            <div class="apps"><img src="media-box/gmail.png" alt="">Gmail</div>
            <div class="apps"><img src="media-box/chatgpt.png" alt="">Chat GPT</div>
            <div class="apps"><img src="media-box/dice.png" alt="">Dice</div>
        </div>

        <footer>
            <div>
                <button> <i class="ri-pencil-fill"></i> Customize Chrome</button>
            </div>
        </footer>
    </div>

</body>

</html>
